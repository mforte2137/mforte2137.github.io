<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding Planner</title>

<link rel="stylesheet" href="onboarding-planner.css">
<script defer src="onboarding-planner.js"></script>

</head>

<body>

<div class="container">

<div class="app-banner">
<div class="banner-title">Onboarding Project Planner</div>
<div class="banner-subtitle">4 Steps to Winning More Quotes</div>
</div>

<div class="card">

<h2>Kickoff Setup</h2>

<label>MSP Name</label>
<input type="text" id="mspName">

<label>Go-Live Date</label>
<input type="date" id="goLiveDate">

</div>

<div class="card">

<h2>Kickoff Assessment</h2>

<label>1. Have you used quoting tools before?</label>
<select id="q1">
<option value="">Select</option>
<option value="several">Used several</option>
<option value="one">Used one</option>
<option value="new">New to quoting tools</option>
</select>

<label>2. How do you like to learn new tools?</label>
<select id="q2">
<option value="">Select</option>
<option value="experiment">Jump in and experiment</option>
<option value="structured">Structured walkthrough</option>
<option value="mix">Mix of both</option>
</select>

<label>3. Who will mainly use Salesbuildr?</label>
<select id="q3">
<option value="">Select</option>
<option value="few">Just a few people</option>
<option value="small">Small team</option>
<option value="departments">Multiple departments</option>
</select>

<label>4. How quickly do you want to start quoting?</label>
<select id="q4">
<option value="">Select</option>
<option value="asap">As soon as possible</option>
<option value="weeks">Within a few weeks</option>
<option value="norush">No rush</option>
</select>

<label>5. What is the main thing you want to improve?</label>
<select id="q5">
<option value="">Select</option>
<option value="appearance">Better looking quotes</option>
<option value="speed">Faster quoting</option>
<option value="sync">Better PSA sync</option>
<option value="pricing">Standardized pricing</option>
<option value="sales">Sales team efficiency</option>
</select>

<label>6. Will you use the Storefront module?</label>
<select id="q6">
<option value="">Select</option>
<option value="yes">Yes</option>
<option value="maybe">Not sure</option>
<option value="no">No</option>
</select>

<button id="recommendBtn">Recommend Onboarding Path</button>

</div>

<div class="card">

<h2>Recommended Plan</h2>

<div id="recommendation"></div>

<div id="sessionPlan"></div>

</div>

<div class="card">

<h2>Onboarding Report</h2>

<textarea id="reportOutput" rows="8"></textarea>

<button id="copyReport">Copy Report</button>

</div>

</div>

</body>
</html>
