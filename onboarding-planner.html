<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Planner</title>
  <link rel="stylesheet" href="onboarding-planner.css">
  <script defer src="onboarding-planner.js"></script>
</head>
<body>

  <div class="container">

    <div class="app-banner">
      <div class="banner-title">Onboarding Project Planner</div>
      <div class="banner-subtitle">4 Steps to Winning More Quotes</div>
    </div>

    <div class="card">
      <h2>Kickoff Setup</h2>

      <label for="mspName">MSP Name</label>
      <input type="text" id="mspName" placeholder="e.g. Acme MSP">

      <label for="goLiveDate">Go-Live Date</label>
      <input type="date" id="goLiveDate">
    </div>

    <div class="card">
      <h2>Kickoff Assessment</h2>

      <label for="q1">1. Have you used quoting / proposal tools before?</label>
      <select id="q1">
        <option value="">Select</option>
        <option value="several">Used several</option>
        <option value="one">Used one</option>
        <option value="new">New to quoting tools</option>
      </select>

      <label for="q2">2. How do you usually like to learn new tools?</label>
      <select id="q2">
        <option value="">Select</option>
        <option value="experiment">Jump in and experiment</option>
        <option value="structured">Structured walkthrough</option>
        <option value="mix">A mix of both</option>
      </select>

      <label for="q3">3. Who will mainly be using Salesbuildr?</label>
      <select id="q3">
        <option value="">Select</option>
        <option value="few">Just a few people</option>
        <option value="small">Small team</option>
        <option value="departments">Multiple departments</option>
      </select>

      <label>4. Which areas matter most right now?</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" name="priority" value="appearance"> Better looking quotes</label>
        <label class="checkbox-item"><input type="checkbox" name="priority" value="speed"> Faster quoting</label>
        <label class="checkbox-item"><input type="checkbox" name="priority" value="sync"> Better PSA sync</label>
        <label class="checkbox-item"><input type="checkbox" name="priority" value="pricing"> Standardized pricing</label>
        <label class="checkbox-item"><input type="checkbox" name="priority" value="sales"> Sales team efficiency</label>
        <label class="checkbox-item"><input type="checkbox" name="priority" value="experience"> Better customer quote experience</label>
      </div>

      <label for="q5">5. Will you use the Storefront module?</label>
      <select id="q5">
        <option value="">Select</option>
        <option value="yes">Yes</option>
        <option value="maybe">Not sure</option>
        <option value="no">No</option>
      </select>

      <button id="recommendBtn" type="button">Recommend Onboarding Path</button>
    </div>

    <div class="card">
      <h2>Recommendation</h2>
      <div id="recommendation"></div>
    </div>

    <div class="card">
      <h2>Session Plan</h2>
      <div id="sessionPlan"></div>
    </div>

    <div class="card">
      <h2>Next Meeting Agenda</h2>
      <div id="agendaPanel" class="agenda-panel">
        <div class="muted">Generate a plan or import a saved plan to view the next meeting agenda.</div>
      </div>
    </div>

    <div class="card">
      <h2>Onboarding Report</h2>
      <textarea id="reportOutput" rows="12"></textarea>

      <div class="button-row">
        <button id="copyReport" type="button">Copy Report</button>
        <button id="exportPlan" type="button">Export Plan</button>
        <label for="importPlanFile" class="import-label">Import Plan</label>
        <input type="file" id="importPlanFile" accept=".json">
      </div>
    </div>

  </div>

</body>
</html>
