<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product &amp; Service Explainer — Salesbuildr Innovation Suite</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="product-explainer.css" />
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <div class="app-kicker">WIDGET CREATOR</div>
    <div class="app-title">Product &amp; Service Explainer</div>
  </div>
</header>

<main class="app-shell">

  <!-- ============================= FORM (left column) ============================= -->
  <section class="panel form-panel">

    <div class="field-row">
      <label for="productName">Product / service name</label>
      <input type="text" id="productName" placeholder="e.g. Meraki MX68 Firewall" />
    </div>

    <div class="field-row">
      <label for="category">Category</label>
      <select id="category">
        <option value="">Select a category…</option>
        <option value="Hardware">Hardware</option>
        <option value="Software">Software</option>
        <option value="Security Service">Security Service</option>
        <option value="Cloud Service">Cloud Service</option>
        <option value="Support Service">Support Service</option>
        <option value="Connectivity">Connectivity</option>
        <option value="Compliance">Compliance</option>
      </select>
      <div id="categorySuggestNote" class="hint-note" hidden></div>
    </div>

    <div class="field-row">
      <label for="customContext">Custom context <span class="label-optional">(optional, max 150 chars)</span></label>
      <input type="text" id="customContext" maxlength="150" placeholder="One sentence for unusual or proprietary items" />
      <div class="char-counter"><span id="contextCharCount">0</span>/150</div>
    </div>

    <!-- ===================== STYLE PICKER (vertical stack) ===================== -->
    <div class="field-row">
      <label class="style-picker-label">Widget style</label>
      <div class="style-picker" id="stylePicker">

        <!-- Style 1 — Layered Rows -->
        <button type="button" class="style-card" data-style="layered">
          <span class="style-check">✓</span>
          <div class="style-thumb">
            <div class="thumb-header thumb-header-grad">
              <div class="thumb-kicker">Security Service</div>
              <div class="thumb-headline">Stop Threats Before They Land</div>
            </div>
            <div class="thumb-intro-row">Short intro line goes here for context.</div>
            <div class="thumb-layered-row">
              <span class="thumb-icon-circle">🎯</span>
              <div class="thumb-layered-text"><strong>Benefit one</strong><span>Short description</span></div>
            </div>
            <div class="thumb-layered-row thumb-row-tint">
              <span class="thumb-icon-circle">📋</span>
              <div class="thumb-layered-text"><strong>Benefit two</strong><span>Short description</span></div>
            </div>
            <div class="thumb-layered-row">
              <span class="thumb-icon-circle">📊</span>
              <div class="thumb-layered-text"><strong>Benefit three</strong><span>Short description</span></div>
            </div>
          </div>
          <div class="style-card-label">
            <strong>Layered Rows</strong>
            <span>Security &amp; support services, training programmes</span>
          </div>
        </button>

        <!-- Style 2 — Numbered Blocks -->
        <button type="button" class="style-card" data-style="numbered">
          <span class="style-check">✓</span>
          <div class="style-thumb">
            <div class="thumb-header thumb-header-grad">
              <div class="thumb-kicker">Cloud Software</div>
              <div class="thumb-headline">Everything Included. One Fee.</div>
            </div>
            <div class="thumb-intro-row">Short intro line goes here for context.</div>
            <div class="thumb-numbered-row">
              <span class="thumb-num">1</span>
              <div class="thumb-numbered-text"><strong>Item name</strong><span>Description</span></div>
              <span class="thumb-badge">Included</span>
            </div>
            <div class="thumb-numbered-row thumb-row-tint">
              <span class="thumb-num">2</span>
              <div class="thumb-numbered-text"><strong>Item name</strong><span>Description</span></div>
              <span class="thumb-badge">Included</span>
            </div>
            <div class="thumb-numbered-row">
              <span class="thumb-num">3</span>
              <div class="thumb-numbered-text"><strong>Item name</strong><span>Description</span></div>
              <span class="thumb-badge">Included</span>
            </div>
          </div>
          <div class="style-card-label">
            <strong>Numbered Blocks</strong>
            <span>Software bundles, service tiers, "what's included"</span>
          </div>
        </button>

        <!-- Style 3 — Benefit Grid -->
        <button type="button" class="style-card" data-style="grid">
          <span class="style-check">✓</span>
          <div class="style-thumb">
            <div class="thumb-header thumb-header-grad">
              <div class="thumb-kicker">Network Security</div>
              <div class="thumb-headline">Enterprise Protection. Fully Managed.</div>
            </div>
            <div class="thumb-intro-row">Short intro line goes here for context.</div>
            <div class="thumb-grid">
              <div class="thumb-grid-cell"><span class="thumb-grid-icon">🛡️</span><strong>Threat Protection</strong><span>Short description</span></div>
              <div class="thumb-grid-cell"><span class="thumb-grid-icon">🔄</span><strong>Always Updated</strong><span>Short description</span></div>
              <div class="thumb-grid-cell"><span class="thumb-grid-icon">📡</span><strong>Full Visibility</strong><span>Short description</span></div>
              <div class="thumb-grid-cell"><span class="thumb-grid-icon">☁️</span><strong>Cloud Managed</strong><span>Short description</span></div>
            </div>
            <div class="thumb-footer">Managed by your IT team <span class="thumb-badge">✓ Managed</span></div>
          </div>
          <div class="style-card-label">
            <strong>Benefit Grid</strong>
            <span>Hardware &amp; multi-feature products</span>
          </div>
        </button>

      </div>
    </div>

    <!-- ===================== COLOUR THEME ===================== -->
    <div class="field-row">
      <label>Colour theme</label>
      <div class="theme-row">
        <div class="swatches" id="colourSwatches">
          <button type="button" class="swatch active" data-hex="#0f1f3d" style="background:#0f1f3d" title="Navy"></button>
          <button type="button" class="swatch" data-hex="#2E74DC" style="background:#2E74DC" title="Blue"></button>
          <button type="button" class="swatch" data-hex="#475569" style="background:#475569" title="Slate"></button>
          <button type="button" class="swatch" data-hex="#065f46" style="background:#065f46" title="Emerald"></button>
          <button type="button" class="swatch" data-hex="#0f766e" style="background:#0f766e" title="Teal"></button>
          <button type="button" class="swatch" data-hex="#991B1B" style="background:#991B1B" title="Crimson"></button>
          <button type="button" class="swatch" data-hex="#92400e" style="background:#92400e" title="Amber"></button>
          <button type="button" class="swatch" data-hex="#1a1a1a" style="background:#1a1a1a" title="Charcoal"></button>
        </div>
        <div class="custom-hex-wrap">
          <span class="hex-hash">#</span>
          <input type="text" id="customHex" maxlength="6" placeholder="0f1f3d" />
          <span class="hex-preview" id="hexPreview"></span>
        </div>
      </div>
    </div>

    <!-- ===================== PHASE 2 (dormant) — manual image slug override =====================
         Hidden until the GitHub image library is populated. See product-explainer.js
         for the toSlug() / imageExists() infrastructure, which is wired but inactive. -->
    <div class="field-row" id="imageOverrideRow" hidden>
      <button type="button" class="link-btn" id="imageOverrideToggle">📷 Use specific image</button>
      <input type="text" id="imageOverrideSlug" placeholder="e.g. meraki-mx68-firewall" hidden />
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" id="clearBtn">Clear</button>
      <button type="button" class="btn-accent" id="generateBtn">Generate Widget</button>
    </div>
    <div class="form-error" id="formError" hidden></div>
  </section>

  <!-- ============================= OUTPUT (right column) ============================= -->
  <section class="panel output-panel">

    <div class="empty-state" id="emptyState">
      <div class="empty-state-icon">💡</div>
      <div class="empty-state-text">Enter a product or service on the left and click <strong>Generate Widget</strong> to see a preview here.</div>
    </div>

    <div class="loading-state" id="loadingState" hidden>
      <div class="dots-loader"><span></span><span></span><span></span></div>
      <div class="loading-msg">Writing your explainer copy…</div>
    </div>

    <div class="widget-output" id="widgetOutput" hidden>
      <div class="widget-output-head">
        <div class="widget-title" id="widgetTitle"></div>
        <div class="image-slug-note" id="imageSlugNote" hidden></div>
      </div>

      <div class="widget-preview-frame" id="widgetPreview"></div>
      <div class="edit-hint">Click any text in the widget above to edit it directly.</div>

      <div class="widget-actions">
        <button type="button" class="btn-secondary" id="regenerateBtn">↺ Regenerate</button>
        <span class="actions-spacer"></span>
        <button type="button" class="btn-secondary" id="copyBtn">Copy HTML</button>
        <button type="button" class="btn-accent" id="pushBtn">Push to Salesbuildr</button>
      </div>

      <!-- Salesbuildr credentials inline panel -->
      <div class="creds-inline" id="credsInline" hidden>
        <div class="creds-inline-title">Salesbuildr connection required</div>
        <div class="field-row-split">
          <div class="field-col">
            <label for="sbApiKey">API Key</label>
            <input type="text" id="sbApiKey" placeholder="Admin → Integrations → API Key" />
          </div>
          <div class="field-col">
            <label for="sbTenantUrl">Tenant URL</label>
            <input type="text" id="sbTenantUrl" placeholder="https://acme.salesbuildr.com" />
          </div>
        </div>
        <div class="creds-inline-actions">
          <button type="button" class="btn-secondary" id="cancelCredsBtn">Cancel</button>
          <button type="button" class="btn-accent" id="saveAndPushBtn">Save &amp; Push</button>
        </div>
      </div>

      <div class="push-feedback" id="pushFeedback" hidden></div>
    </div>

    <!-- ===================== GENERATED THIS SESSION ===================== -->
    <div class="session-list-block" id="sessionListBlock" hidden>
      <div class="session-list-title">Generated this session</div>
      <div class="session-list" id="sessionList"></div>
    </div>

  </section>

</main>

<script src="product-explainer.js"></script>
</body>
</html>
