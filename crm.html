<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClientLog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f4;
      --surface:   #ffffff;
      --border:    #e5e5e4;
      --muted:     #a8a29e;
      --text:      #1c1917;
      --subtext:   #57534e;
      --accent:    #0ea5e9;
      --accent-dk: #0284c7;
      --green:     #22c55e;
      --red:       #ef4444;
      --done-bg:   #f0fdf4;
      --done-text: #15803d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 12px;
      z-index: 10;
    }
    .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: var(--accent); white-space: nowrap; }
    .logo span { color: var(--text); }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* ── Buttons ── */
    button { cursor: pointer; border: none; border-radius: 7px; font-size: 13px; font-weight: 500; padding: 7px 13px; transition: background 0.15s, opacity 0.15s; }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dk); }
    .btn-ghost     { background: transparent; color: var(--subtext); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-danger    { background: transparent; color: var(--red); border: 1px solid #fca5a5; padding: 5px 10px; font-size: 12px; }
    .btn-danger:hover { background: #fff1f1; }
    .btn-icon      { background: transparent; border: none; padding: 4px 6px; border-radius: 5px; color: var(--muted); font-size: 14px; line-height: 1; }
    .btn-icon:hover { background: var(--bg); color: var(--text); }
    .btn-sm        { padding: 5px 10px; font-size: 12px; }

    /* ── 3-column layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── LEFT: Company list ── */
    .col-left {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-top {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 8px 10px 8px 30px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 12px; pointer-events: none; }
    .company-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .company-item {
      padding: 9px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s;
    }
    .company-item:hover { background: var(--bg); }
    .company-item.active { background: #e0f2fe; border-left-color: var(--accent); }
    .company-item .ci-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .company-item .ci-contact { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .empty-list { padding: 20px 14px; font-size: 13px; color: var(--muted); text-align: center; }

    /* ── CENTER: Notes ── */
    .col-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
      background: var(--bg);
    }
    .col-center-inner {
      flex: 1;
      overflow-y: auto;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── RIGHT: Info + Tasks ── */
    .col-right {
      width: 290px;
      flex-shrink: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .col-right-inner {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 10px;
      text-align: center;
      padding: 40px;
    }
    .empty-state .es-icon { font-size: 36px; }
    .empty-state .es-title { font-size: 15px; font-weight: 600; color: var(--subtext); }
    .empty-state .es-sub { font-size: 13px; line-height: 1.5; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    /* ── Company info card (right col) ── */
    .info-company-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .info-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .info-field label {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .info-field .info-val {
      font-size: 13px;
      color: var(--text);
      word-break: break-all;
    }
    .info-field input {
      width: 100%;
      padding: 6px 9px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .info-field input:focus { border-color: var(--accent); background: #fff; }
    .portal-link { font-size: 13px; color: var(--accent); text-decoration: none; }
    .portal-link:hover { text-decoration: underline; }
    .info-edit-actions { display: flex; gap: 6px; margin-top: 10px; }
    .card-actions { display: flex; gap: 6px; margin-top: 10px; }

    /* ── Tasks (right col) ── */
    .task-list { display: flex; flex-direction: column; gap: 5px; }
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #fafaf9;
      transition: background 0.15s;
    }
    .task-item.done { background: var(--done-bg); border-color: #bbf7d0; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }
    .task-check {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: 700;
      transition: background 0.15s, border-color 0.15s;
      background: #fff;
      color: #fff;
    }
    .task-item.done .task-check { background: var(--green); border-color: var(--green); }
    .task-check:hover { border-color: var(--green); }
    .task-text { flex: 1; font-size: 13px; line-height: 1.4; color: var(--text); }
    .task-date { font-size: 10.5px; color: var(--muted); display: block; margin-top: 1px; }
    .task-add-row { display: flex; gap: 6px; margin-top: 8px; }
    .task-add-row input {
      flex: 1;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .task-add-row input:focus { border-color: var(--accent); }
    .badge {
      font-size: 11px;
      background: #e0f2fe;
      color: #0369a1;
      padding: 1px 7px;
      border-radius: 99px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
    }

    /* ── Notes (center col) ── */
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0 2px 0;
    }
    .notes-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .note-add-area { display: flex; flex-direction: column; gap: 7px; }
    .note-add-area textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      min-height: 85px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
      background: var(--surface);
    }
    .note-add-area textarea:focus { border-color: var(--accent); }
    .note-add-footer { display: flex; align-items: center; justify-content: space-between; }
    .note-hint { font-size: 11.5px; color: var(--muted); }

    .note-list { display: flex; flex-direction: column; gap: 9px; }
    .note-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      overflow: hidden;
    }
    .note-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: #fafaf9;
      border-bottom: 1px solid var(--border);
    }
    .note-date { font-size: 11.5px; color: var(--muted); font-weight: 500; }
    .note-body { padding: 10px 12px; font-size: 13.5px; line-height: 1.65; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .notes-empty { font-size: 13px; color: var(--muted); padding: 8px 0; }

    /* ── Note inline edit ── */
    .note-edit-area {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .note-edit-area textarea {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid var(--accent);
      border-radius: 7px;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      min-height: 80px;
      outline: none;
      line-height: 1.6;
      background: #f0f9ff;
    }
    .note-edit-actions { display: flex; gap: 7px; justify-content: flex-end; }

    /* ── Column section labels ── */
    .col-label {
      padding: 12px 22px 0;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      flex-shrink: 0;
    }
    .col-label-right { padding: 12px 18px 0; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 50; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: 12px; padding: 24px; width: 420px; max-width: calc(100vw - 32px); box-shadow: 0 20px 60px rgba(0,0,0,0.18); }
    .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .modal-fields { display: flex; flex-direction: column; gap: 12px; }
    .modal-field label { display: block; font-size: 12px; font-weight: 600; color: var(--subtext); margin-bottom: 4px; }
    .modal-field input { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 7px; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
    .modal-field input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 13px; opacity: 0; transform: translateY(6px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Divider ── */
    hr.section-div { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    #import-input { display: none; }
  </style>
</head>
<body>

<!-- Top bar -->
<header>
  <div class="logo">Client<span>Log</span></div>
  <div class="header-actions">
    <button class="btn-ghost btn-sm" onclick="exportData()">⬇ Export</button>
    <button class="btn-ghost btn-sm" onclick="document.getElementById('import-input').click()">⬆ Import</button>
    <input type="file" id="import-input" accept=".json" onchange="importData(event)" />
    <button class="btn-primary btn-sm" onclick="openAddCompany()">+ Add Company</button>
  </div>
</header>

<!-- 3-column layout -->
<div class="layout">

  <!-- LEFT: Company list -->
  <aside class="col-left">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search companies…" oninput="renderList()" />
      </div>
    </div>
    <div class="company-list" id="company-list"></div>
  </aside>

  <!-- CENTER: Notes -->
  <section class="col-center">
    <div id="center-empty" class="empty-state">
      <div class="es-icon">📋</div>
      <div class="es-title">No company selected</div>
      <div class="es-sub">Search or pick a company from<br>the list to see their notes.</div>
    </div>
    <div id="center-panel" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <div class="col-label">Notes</div>
      <div class="col-center-inner" id="notes-content"></div>
    </div>
  </section>

  <!-- RIGHT: Info + Tasks -->
  <aside class="col-right">
    <div id="right-empty" class="empty-state" style="font-size:13px; color:var(--muted); padding:30px 16px; text-align:center;">
      <div style="font-size:28px;margin-bottom:8px;">🏢</div>
      <div style="font-weight:600;color:var(--subtext);margin-bottom:4px;">Company info &amp; tasks</div>
      <div>will appear here</div>
    </div>
    <div id="right-panel" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <div class="col-label col-label-right">Company</div>
      <div class="col-right-inner" id="right-content"></div>
    </div>
  </aside>
</div>

<!-- Add Company Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>Add Company</h3>
    <div class="modal-fields">
      <div class="modal-field"><label>Company Name *</label><input id="f-name" placeholder="Acme Corp" /></div>
      <div class="modal-field"><label>Contact Name</label><input id="f-contact" placeholder="Jane Smith" /></div>
      <div class="modal-field"><label>Contact Email</label><input id="f-email" type="email" placeholder="jane@acme.com" /></div>
      <div class="modal-field"><label>Tenant Portal URL</label><input id="f-portal" placeholder="https://acme.yourapp.com" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeAddCompany()">Cancel</button>
      <button class="btn-primary" onclick="saveNewCompany()">Add Company</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── Storage ──
  const STORAGE_KEY = 'clientlog_v1';
  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { companies: [] }; }
    catch { return { companies: [] }; }
  }
  function save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

  let state = load();
  let activeId = null;

  // ── Utils ──
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
      + ' · ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  }
  function fmtDateShort(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }
  function esc(s='') {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }
  function getCompany(id) { return state.companies.find(c => c.id === id); }

  // ── Render sidebar list ──
  function renderList() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const el = document.getElementById('company-list');
    let items = [...state.companies].sort((a,b) => a.name.localeCompare(b.name));
    if (q) items = items.filter(c =>
      c.name.toLowerCase().includes(q) || (c.contact||'').toLowerCase().includes(q)
    );
    if (!items.length) {
      el.innerHTML = `<div class="empty-list">${q ? 'No matches' : 'No companies yet'}</div>`;
      return;
    }
    el.innerHTML = items.map(c => `
      <div class="company-item${c.id===activeId?' active':''}" onclick="selectCompany('${c.id}')">
        <div class="ci-name">${esc(c.name)}</div>
        <div class="ci-contact">${esc(c.contact || '—')}</div>
      </div>
    `).join('');
  }

  // ── Select ──
  function selectCompany(id) {
    activeId = id;
    renderList();
    renderCenter();
    renderRight();
  }

  // ── CENTER: Notes ──
  function renderCenter() {
    const empty = document.getElementById('center-empty');
    const panel = document.getElementById('center-panel');
    const content = document.getElementById('notes-content');
    const c = getCompany(activeId);

    if (!c) {
      empty.style.display = 'flex';
      panel.style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    panel.style.display = 'flex';

    const notes = c.notes || [];
    content.innerHTML = `
      <div class="note-add-area">
        <textarea id="new-note-input" placeholder="Paste a meeting summary, type notes… (Ctrl+Enter to save)"></textarea>
        <div class="note-add-footer">
          <span class="note-hint">Ctrl+Enter to save</span>
          <button class="btn-primary btn-sm" onclick="addNote('${c.id}')">Save Note</button>
        </div>
      </div>
      ${notes.length === 0
        ? `<div class="notes-empty">No notes yet — add your first one above.</div>`
        : `<div class="note-list">${notes.map(n => `
            <div class="note-item" id="note-${n.id}">
              <div class="note-meta">
                <span class="note-date">📅 ${fmtDate(n.created)}</span>
                <div style="display:flex;gap:2px">
                  <button class="btn-icon" onclick="editNote('${c.id}','${n.id}')" title="Edit note">✏️</button>
                  <button class="btn-icon" onclick="deleteNote('${c.id}','${n.id}')" title="Delete note">🗑</button>
                </div>
              </div>
              <div class="note-body" id="note-body-${n.id}">${esc(n.text)}</div>
            </div>`).join('')}
          </div>`
      }
    `;

    document.getElementById('new-note-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addNote(c.id);
    });
  }

  // ── RIGHT: Company info + Tasks ──
  function renderRight() {
    const empty = document.getElementById('right-empty');
    const panel = document.getElementById('right-panel');
    const content = document.getElementById('right-content');
    const c = getCompany(activeId);

    if (!c) {
      empty.style.display = 'flex';
      panel.style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    panel.style.display = 'flex';

    const openTasks = (c.tasks||[]).filter(t => !t.done);
    const doneTasks = (c.tasks||[]).filter(t => t.done);
    const allTasks  = [...openTasks, ...doneTasks];

    content.innerHTML = `
      <!-- Company info card -->
      <div class="card">
        <div id="info-view-wrap">
          <div class="info-company-name">${esc(c.name)}</div>
          <div class="info-row">
            <div class="info-field">
              <label>Contact</label>
              <div class="info-val">${esc(c.contact || '—')}</div>
            </div>
            <div class="info-field">
              <label>Email</label>
              <div class="info-val">${c.email
                ? `<a class="portal-link" href="mailto:${esc(c.email)}">${esc(c.email)}</a>`
                : '—'}</div>
            </div>
            <div class="info-field">
              <label>Tenant Portal</label>
              <div class="info-val">${c.portal
                ? `<a class="portal-link" href="${esc(c.portal)}" target="_blank" rel="noopener">🔗 Open portal</a>`
                : '—'}</div>
            </div>
          </div>
          <div class="card-actions">
            <button class="btn-ghost btn-sm" onclick="startEditInfo()">✏️ Edit</button>
            <button class="btn-danger" onclick="deleteCompany('${c.id}')">🗑 Delete</button>
          </div>
        </div>
        <div id="info-edit-wrap" style="display:none">
          <div class="info-row">
            <div class="info-field"><label>Company Name</label><input id="e-name" value="${esc(c.name)}" /></div>
            <div class="info-field"><label>Contact Name</label><input id="e-contact" value="${esc(c.contact||'')}" /></div>
            <div class="info-field"><label>Contact Email</label><input id="e-email" type="email" value="${esc(c.email||'')}" /></div>
            <div class="info-field"><label>Tenant Portal URL</label><input id="e-portal" value="${esc(c.portal||'')}" /></div>
          </div>
          <div class="info-edit-actions">
            <button class="btn-primary btn-sm" onclick="saveEditInfo('${c.id}')">Save</button>
            <button class="btn-ghost btn-sm" onclick="cancelEditInfo()">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Tasks card -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Tasks</span>
          <span class="badge">${openTasks.length} open</span>
        </div>
        <div class="task-list" id="task-list">
          ${allTasks.length === 0
            ? `<div style="font-size:13px;color:var(--muted);padding:2px 0">No tasks yet.</div>`
            : allTasks.map(t => `
              <div class="task-item${t.done?' done':''}" id="task-${t.id}">
                <div class="task-check" onclick="toggleTask('${c.id}','${t.id}')">✓</div>
                <div style="flex:1;min-width:0">
                  <div class="task-text">${esc(t.text)}</div>
                  <span class="task-date">${fmtDateShort(t.created)}</span>
                </div>
                <button class="btn-icon" onclick="deleteTask('${c.id}','${t.id}')" title="Remove">✕</button>
              </div>`).join('')
          }
        </div>
        <div class="task-add-row">
          <input type="text" id="new-task-input" placeholder="New task… (Enter)" onkeydown="if(event.key==='Enter') addTask('${c.id}')" />
          <button class="btn-primary btn-sm" onclick="addTask('${c.id}')">Add</button>
        </div>
      </div>
    `;
  }

  // ── Edit info ──
  function startEditInfo() {
    document.getElementById('info-view-wrap').style.display = 'none';
    document.getElementById('info-edit-wrap').style.display = 'block';
    document.getElementById('e-name').focus();
  }
  function cancelEditInfo() {
    document.getElementById('info-view-wrap').style.display = 'block';
    document.getElementById('info-edit-wrap').style.display = 'none';
  }
  function saveEditInfo(companyId) {
    const c = getCompany(companyId);
    const name = document.getElementById('e-name').value.trim();
    if (!name) { document.getElementById('e-name').focus(); return; }
    c.name    = name;
    c.contact = document.getElementById('e-contact').value.trim();
    c.email   = document.getElementById('e-email').value.trim();
    c.portal  = document.getElementById('e-portal').value.trim();
    save(state);
    renderList();
    renderRight();
    toast('Saved');
  }

  // ── Delete company ──
  function deleteCompany(companyId) {
    const c = getCompany(companyId);
    if (!confirm(`Delete "${c.name}" and all its data? This cannot be undone.`)) return;
    state.companies = state.companies.filter(x => x.id !== companyId);
    activeId = null;
    save(state);
    renderList();
    renderCenter();
    renderRight();
    toast('Company deleted');
  }

  // ── Tasks ──
  function addTask(companyId) {
    const inp = document.getElementById('new-task-input');
    const text = inp.value.trim();
    if (!text) return;
    const c = getCompany(companyId);
    c.tasks = c.tasks || [];
    c.tasks.unshift({ id: uid(), text, done: false, created: new Date().toISOString() });
    save(state);
    inp.value = '';
    renderRight();
    document.getElementById('new-task-input').focus();
  }
  function toggleTask(companyId, taskId) {
    const c = getCompany(companyId);
    const t = c.tasks.find(t => t.id === taskId);
    if (!t) return;
    t.done = !t.done;
    save(state);
    renderRight();
  }
  function deleteTask(companyId, taskId) {
    const c = getCompany(companyId);
    c.tasks = c.tasks.filter(t => t.id !== taskId);
    save(state);
    renderRight();
  }

  // ── Notes ──
  function addNote(companyId) {
    const inp = document.getElementById('new-note-input');
    const text = inp.value.trim();
    if (!text) return;
    const c = getCompany(companyId);
    c.notes = c.notes || [];
    c.notes.unshift({ id: uid(), text, created: new Date().toISOString() });
    save(state);
    inp.value = '';
    renderCenter();
    toast('Note saved');
  }
  function deleteNote(companyId, noteId) {
    if (!confirm('Delete this note?')) return;
    const c = getCompany(companyId);
    c.notes = c.notes.filter(n => n.id !== noteId);
    save(state);
    renderCenter();
  }

  function editNote(companyId, noteId) {
    const c = getCompany(companyId);
    const n = (c.notes||[]).find(n => n.id === noteId);
    if (!n) return;
    const item = document.getElementById(`note-${noteId}`);
    // Replace the body div with an inline edit area
    const bodyEl = document.getElementById(`note-body-${noteId}`);
    bodyEl.style.display = 'none';
    // Hide the edit/delete buttons while editing
    const metaButtons = item.querySelector('.note-meta div');
    metaButtons.style.display = 'none';
    // Insert edit area if not already present
    if (!item.querySelector('.note-edit-area')) {
      const editArea = document.createElement('div');
      editArea.className = 'note-edit-area';
      editArea.id = `note-edit-area-${noteId}`;
      editArea.innerHTML = `
        <textarea id="note-edit-ta-${noteId}">${esc(n.text)}</textarea>
        <div class="note-edit-actions">
          <button class="btn-ghost btn-sm" onclick="cancelNoteEdit('${noteId}')">Cancel</button>
          <button class="btn-primary btn-sm" onclick="saveNoteEdit('${companyId}','${noteId}')">Save</button>
        </div>`;
      item.appendChild(editArea);
    } else {
      item.querySelector('.note-edit-area').style.display = 'flex';
      item.querySelector('.note-edit-area').style.flexDirection = 'column';
    }
    // Focus and put cursor at end
    const ta = document.getElementById(`note-edit-ta-${noteId}`);
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
    // Ctrl+Enter to save from the edit textarea
    ta.onkeydown = e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) saveNoteEdit(companyId, noteId); };
  }

  function saveNoteEdit(companyId, noteId) {
    const c = getCompany(companyId);
    const n = (c.notes||[]).find(n => n.id === noteId);
    if (!n) return;
    const ta = document.getElementById(`note-edit-ta-${noteId}`);
    const newText = ta.value.trim();
    if (!newText) { ta.focus(); return; }
    n.text = newText;
    save(state);
    // Update DOM in place — no full re-render, so scroll position is preserved
    const bodyEl = document.getElementById(`note-body-${noteId}`);
    bodyEl.textContent = newText;
    bodyEl.style.display = '';
    const item = document.getElementById(`note-${noteId}`);
    item.querySelector('.note-meta div').style.display = '';
    item.querySelector('.note-edit-area').style.display = 'none';
    toast('Note updated');
  }

  function cancelNoteEdit(noteId) {
    const item = document.getElementById(`note-${noteId}`);
    document.getElementById(`note-body-${noteId}`).style.display = '';
    item.querySelector('.note-meta div').style.display = '';
    item.querySelector('.note-edit-area').style.display = 'none';
  }

  // ── Add company modal ──
  function openAddCompany() {
    ['f-name','f-contact','f-email','f-portal'].forEach(id => document.getElementById(id).value='');
    document.getElementById('add-modal').classList.add('open');
    setTimeout(() => document.getElementById('f-name').focus(), 50);
  }
  function closeAddCompany() { document.getElementById('add-modal').classList.remove('open'); }
  function saveNewCompany() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { document.getElementById('f-name').focus(); return; }
    const company = {
      id: uid(), name,
      contact: document.getElementById('f-contact').value.trim(),
      email:   document.getElementById('f-email').value.trim(),
      portal:  document.getElementById('f-portal').value.trim(),
      tasks: [], notes: []
    };
    state.companies.push(company);
    save(state);
    closeAddCompany();
    renderList();
    selectCompany(company.id);
    toast(`"${name}" added`);
  }
  document.getElementById('add-modal').addEventListener('click', function(e) { if (e.target===this) closeAddCompany(); });
  document.getElementById('add-modal').addEventListener('keydown', e => {
    if (e.key==='Enter') saveNewCompany();
    if (e.key==='Escape') closeAddCompany();
  });

  // ── Export / Import ──
  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `clientlog-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Exported!');
  }
  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.companies || !Array.isArray(data.companies)) throw new Error();
        if (!confirm(`Import ${data.companies.length} companies? This will replace your current data.`)) return;
        state = data;
        save(state);
        activeId = null;
        renderList(); renderCenter(); renderRight();
        toast(`Imported ${data.companies.length} companies`);
      } catch { alert('Invalid file — please use a ClientLog export.'); }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  // ── Init ──
  renderList();
  renderCenter();
  renderRight();
</script>
</body>
</html>
