<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClientLog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f4;
      --surface:   #ffffff;
      --border:    #e5e5e4;
      --muted:     #a8a29e;
      --text:      #1c1917;
      --subtext:   #57534e;
      --accent:    #0ea5e9;
      --accent-dk: #0284c7;
      --green:     #22c55e;
      --red:       #ef4444;
      --done-bg:   #f0fdf4;
      --done-text: #15803d;
      --tag-bg:    #e0f2fe;
      --tag-text:  #0369a1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 12px;
    }
    .logo {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--accent);
      white-space: nowrap;
    }
    .logo span { color: var(--text); }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 13px;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dk); }
    .btn-ghost     { background: transparent; color: var(--subtext); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-danger    { background: transparent; color: var(--red); border: 1px solid #fca5a5; }
    .btn-danger:hover { background: #fff1f1; }
    .btn-icon      { background: transparent; border: none; padding: 4px 6px; border-radius: 5px; color: var(--muted); font-size: 15px; line-height: 1; }
    .btn-icon:hover { background: var(--bg); color: var(--text); }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-top {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .search-wrap {
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 8px 10px 8px 32px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute;
      left: 9px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 13px;
      pointer-events: none;
    }
    .company-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .company-item {
      padding: 9px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s;
    }
    .company-item:hover { background: var(--bg); }
    .company-item.active {
      background: #e0f2fe;
      border-left-color: var(--accent);
    }
    .company-item .ci-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .company-item .ci-contact {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty-list {
      padding: 20px 14px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 10px;
      text-align: center;
    }
    .empty-state .es-icon { font-size: 40px; }
    .empty-state .es-title { font-size: 16px; font-weight: 600; color: var(--subtext); }
    .empty-state .es-sub { font-size: 13px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    /* ── Company info card ── */
    .company-name-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .company-name-row h2 {
      font-size: 20px;
      font-weight: 700;
      flex: 1;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .info-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .info-field input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .info-field input:focus { border-color: var(--accent); background: #fff; }
    .portal-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .portal-link:hover { text-decoration: underline; }

    /* ── Tasks ── */
    .task-list { display: flex; flex-direction: column; gap: 6px; }
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--bg);
      transition: background 0.15s;
    }
    .task-item.done {
      background: var(--done-bg);
      border-color: #bbf7d0;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .task-check {
      width: 17px; height: 17px;
      border: 2px solid var(--border);
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      background: #fff;
    }
    .task-item.done .task-check {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .task-check:hover { border-color: var(--green); }
    .task-text {
      flex: 1;
      font-size: 13.5px;
      line-height: 1.45;
      color: var(--text);
    }
    .task-date { font-size: 11px; color: var(--muted); white-space: nowrap; margin-top: 2px; }
    .task-add-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .task-add-row input {
      flex: 1;
      padding: 8px 11px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .task-add-row input:focus { border-color: var(--accent); }

    /* ── Notes ── */
    .note-list { display: flex; flex-direction: column; gap: 10px; }
    .note-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      overflow: hidden;
    }
    .note-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: #fafaf9;
      border-bottom: 1px solid var(--border);
    }
    .note-date { font-size: 12px; color: var(--muted); font-weight: 500; }
    .note-body {
      padding: 10px 12px;
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .note-add-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .note-add-area textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
    }
    .note-add-area textarea:focus { border-color: var(--accent); }

    /* ── Modals ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      width: 420px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    }
    .modal h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 18px;
    }
    .modal-fields { display: flex; flex-direction: column; gap: 12px; }
    .modal-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--subtext);
      margin-bottom: 4px;
    }
    .modal-field input {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .modal-field input:focus { border-color: var(--accent); }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 20px; right: 20px;
      background: var(--text);
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── File input hidden ── */
    #import-input { display: none; }
  </style>
</head>
<body>

<!-- Top bar -->
<header>
  <div class="logo">Client<span>Log</span></div>
  <div class="header-actions">
    <button class="btn-ghost" onclick="exportData()">⬇ Export</button>
    <button class="btn-ghost" onclick="document.getElementById('import-input').click()">⬆ Import</button>
    <input type="file" id="import-input" accept=".json" onchange="importData(event)" />
    <button class="btn-primary" onclick="openAddCompany()">+ Add Company</button>
  </div>
</header>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search companies…" oninput="renderList()" />
      </div>
    </div>
    <div class="company-list" id="company-list"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-panel">
    <div class="empty-state" id="empty-state">
      <div class="es-icon">📋</div>
      <div class="es-title">Select a company</div>
      <div class="es-sub">Search or pick a company from the list,<br>or add a new one to get started.</div>
    </div>
    <div id="detail-panel" style="display:none; display:flex; flex-direction:column; gap:20px;"></div>
  </main>
</div>

<!-- Add Company Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>Add Company</h3>
    <div class="modal-fields">
      <div class="modal-field"><label>Company Name *</label><input id="f-name" placeholder="Acme Corp" /></div>
      <div class="modal-field"><label>Contact Name</label><input id="f-contact" placeholder="Jane Smith" /></div>
      <div class="modal-field"><label>Contact Email</label><input id="f-email" type="email" placeholder="jane@acme.com" /></div>
      <div class="modal-field"><label>Tenant Portal URL</label><input id="f-portal" placeholder="https://acme.yourapp.com" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeAddCompany()">Cancel</button>
      <button class="btn-primary" onclick="saveNewCompany()">Add Company</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── Storage ──
  const STORAGE_KEY = 'clientlog_v1';

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { companies: [] }; }
    catch { return { companies: [] }; }
  }
  function save(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  let state = load();
  let activeId = null;

  // ── Utils ──
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
      + ' · ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  }
  function fmtDateShort(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── Render sidebar list ──
  function renderList() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const el = document.getElementById('company-list');
    let items = state.companies;
    if (q) items = items.filter(c =>
      c.name.toLowerCase().includes(q) ||
      (c.contact||'').toLowerCase().includes(q)
    );
    items = [...items].sort((a,b) => a.name.localeCompare(b.name));
    if (!items.length) {
      el.innerHTML = `<div class="empty-list">${q ? 'No matches' : 'No companies yet'}</div>`;
      return;
    }
    el.innerHTML = items.map(c => `
      <div class="company-item${c.id===activeId?' active':''}" onclick="selectCompany('${c.id}')">
        <div class="ci-name">${esc(c.name)}</div>
        <div class="ci-contact">${esc(c.contact||'No contact')}</div>
      </div>
    `).join('');
  }

  function esc(s='') {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Select company ──
  function selectCompany(id) {
    activeId = id;
    renderList();
    renderDetail();
  }

  function getCompany(id) {
    return state.companies.find(c => c.id === id);
  }

  // ── Render detail ──
  function renderDetail() {
    const emptyEl = document.getElementById('empty-state');
    const detailEl = document.getElementById('detail-panel');
    const c = getCompany(activeId);
    if (!c) {
      emptyEl.style.display = 'flex';
      detailEl.style.display = 'none';
      return;
    }
    emptyEl.style.display = 'none';
    detailEl.style.display = 'flex';

    const openTasks = (c.tasks||[]).filter(t=>!t.done);
    const doneTasks = (c.tasks||[]).filter(t=>t.done);
    const allTasks = [...openTasks, ...doneTasks];

    detailEl.innerHTML = `
      <!-- Info card -->
      <div class="card">
        <div class="company-name-row">
          <h2 id="view-name">${esc(c.name)}</h2>
          <button class="btn-ghost" onclick="startEditInfo()" id="edit-btn">✏️ Edit</button>
          <button class="btn-danger" onclick="deleteCompany('${c.id}')">🗑 Delete</button>
        </div>
        <div id="info-view">
          <div class="info-grid">
            <div class="info-field">
              <label>Contact</label>
              <div style="font-size:13.5px;padding:4px 0">${esc(c.contact||'—')}</div>
            </div>
            <div class="info-field">
              <label>Email</label>
              <div style="font-size:13.5px;padding:4px 0">${c.email ? `<a class="portal-link" href="mailto:${esc(c.email)}">${esc(c.email)}</a>` : '—'}</div>
            </div>
            <div class="info-field" style="grid-column:1/-1">
              <label>Tenant Portal</label>
              <div style="font-size:13.5px;padding:4px 0">${c.portal ? `<a class="portal-link" href="${esc(c.portal)}" target="_blank" rel="noopener">🔗 ${esc(c.portal)}</a>` : '—'}</div>
            </div>
          </div>
        </div>
        <div id="info-edit" style="display:none">
          <div class="info-grid">
            <div class="info-field"><label>Company Name</label><input id="e-name" value="${esc(c.name)}" /></div>
            <div class="info-field"><label>Contact Name</label><input id="e-contact" value="${esc(c.contact||'')}" /></div>
            <div class="info-field"><label>Contact Email</label><input id="e-email" type="email" value="${esc(c.email||'')}" /></div>
            <div class="info-field"><label>Tenant Portal URL</label><input id="e-portal" value="${esc(c.portal||'')}" /></div>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn-primary" onclick="saveEditInfo('${c.id}')">Save</button>
            <button class="btn-ghost" onclick="cancelEditInfo()">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Tasks card -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Tasks <span style="font-size:12px;background:#e0f2fe;color:#0369a1;padding:1px 7px;border-radius:99px;margin-left:6px;font-weight:600;text-transform:none;letter-spacing:0">${openTasks.length} open</span></div>
        </div>
        <div class="task-list" id="task-list">
          ${allTasks.length === 0 ? `<div style="font-size:13px;color:var(--muted);padding:4px 0">No tasks yet.</div>` : ''}
          ${allTasks.map(t => `
            <div class="task-item${t.done?' done':''}" id="task-${t.id}">
              <div class="task-check" onclick="toggleTask('${c.id}','${t.id}')">
                ${t.done ? '✓' : ''}
              </div>
              <div style="flex:1;min-width:0">
                <div class="task-text">${esc(t.text)}</div>
                <div class="task-date">${fmtDateShort(t.created)}</div>
              </div>
              <button class="btn-icon" onclick="deleteTask('${c.id}','${t.id}')" title="Remove">✕</button>
            </div>
          `).join('')}
        </div>
        <div class="task-add-row">
          <input type="text" id="new-task-input" placeholder="Add a task… (press Enter)" onkeydown="if(event.key==='Enter') addTask('${c.id}')" />
          <button class="btn-primary" onclick="addTask('${c.id}')">Add</button>
        </div>
      </div>

      <!-- Notes card -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Notes</div>
        </div>
        <div class="note-add-area">
          <textarea id="new-note-input" placeholder="Paste meeting summary, type notes… Press Ctrl+Enter to save."></textarea>
          <div style="display:flex;justify-content:flex-end">
            <button class="btn-primary" onclick="addNote('${c.id}')">Save Note</button>
          </div>
        </div>
        <div style="margin-top:14px" class="note-list" id="note-list">
          ${(c.notes||[]).length===0 ? `<div style="font-size:13px;color:var(--muted);padding:4px 0">No notes yet.</div>` : ''}
          ${(c.notes||[]).map(n => `
            <div class="note-item" id="note-${n.id}">
              <div class="note-meta">
                <span class="note-date">📅 ${fmtDate(n.created)}</span>
                <button class="btn-icon" onclick="deleteNote('${c.id}','${n.id}')" title="Delete note">🗑</button>
              </div>
              <div class="note-body">${esc(n.text)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;

    // Ctrl+Enter shortcut for notes
    document.getElementById('new-note-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addNote(c.id);
    });
  }

  // ── Tasks ──
  function addTask(companyId) {
    const inp = document.getElementById('new-task-input');
    const text = inp.value.trim();
    if (!text) return;
    const c = getCompany(companyId);
    if (!c) return;
    c.tasks = c.tasks || [];
    c.tasks.unshift({ id: uid(), text, done: false, created: new Date().toISOString() });
    save(state);
    inp.value = '';
    renderDetail();
    document.getElementById('new-task-input').focus();
  }

  function toggleTask(companyId, taskId) {
    const c = getCompany(companyId);
    const t = c.tasks.find(t=>t.id===taskId);
    if (!t) return;
    t.done = !t.done;
    save(state);
    renderDetail();
  }

  function deleteTask(companyId, taskId) {
    const c = getCompany(companyId);
    c.tasks = c.tasks.filter(t=>t.id!==taskId);
    save(state);
    renderDetail();
  }

  // ── Notes ──
  function addNote(companyId) {
    const inp = document.getElementById('new-note-input');
    const text = inp.value.trim();
    if (!text) return;
    const c = getCompany(companyId);
    if (!c) return;
    c.notes = c.notes || [];
    c.notes.unshift({ id: uid(), text, created: new Date().toISOString() });
    save(state);
    inp.value = '';
    renderDetail();
    toast('Note saved');
  }

  function deleteNote(companyId, noteId) {
    if (!confirm('Delete this note?')) return;
    const c = getCompany(companyId);
    c.notes = c.notes.filter(n=>n.id!==noteId);
    save(state);
    renderDetail();
  }

  // ── Edit info ──
  function startEditInfo() {
    document.getElementById('info-view').style.display = 'none';
    document.getElementById('info-edit').style.display = 'block';
    document.getElementById('edit-btn').style.display = 'none';
  }
  function cancelEditInfo() {
    document.getElementById('info-view').style.display = 'block';
    document.getElementById('info-edit').style.display = 'none';
    document.getElementById('edit-btn').style.display = '';
  }
  function saveEditInfo(companyId) {
    const c = getCompany(companyId);
    const name = document.getElementById('e-name').value.trim();
    if (!name) { alert('Company name is required.'); return; }
    c.name    = name;
    c.contact = document.getElementById('e-contact').value.trim();
    c.email   = document.getElementById('e-email').value.trim();
    c.portal  = document.getElementById('e-portal').value.trim();
    save(state);
    renderList();
    renderDetail();
    toast('Company updated');
  }

  // ── Delete company ──
  function deleteCompany(companyId) {
    const c = getCompany(companyId);
    if (!confirm(`Delete "${c.name}" and all its data? This cannot be undone.`)) return;
    state.companies = state.companies.filter(c=>c.id!==companyId);
    activeId = null;
    save(state);
    renderList();
    renderDetail();
    toast('Company deleted');
  }

  // ── Add company modal ──
  function openAddCompany() {
    ['f-name','f-contact','f-email','f-portal'].forEach(id => document.getElementById(id).value='');
    document.getElementById('add-modal').classList.add('open');
    setTimeout(() => document.getElementById('f-name').focus(), 50);
  }
  function closeAddCompany() {
    document.getElementById('add-modal').classList.remove('open');
  }
  function saveNewCompany() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { document.getElementById('f-name').focus(); return; }
    const company = {
      id:      uid(),
      name,
      contact: document.getElementById('f-contact').value.trim(),
      email:   document.getElementById('f-email').value.trim(),
      portal:  document.getElementById('f-portal').value.trim(),
      tasks:   [],
      notes:   []
    };
    state.companies.push(company);
    save(state);
    closeAddCompany();
    renderList();
    selectCompany(company.id);
    toast(`"${name}" added`);
  }

  // Close modal on overlay click
  document.getElementById('add-modal').addEventListener('click', function(e) {
    if (e.target === this) closeAddCompany();
  });
  // Enter key in add modal
  document.getElementById('add-modal').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveNewCompany();
    if (e.key === 'Escape') closeAddCompany();
  });

  // ── Export / Import ──
  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `clientlog-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Exported!');
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.companies || !Array.isArray(data.companies)) throw new Error();
        if (!confirm(`Import ${data.companies.length} companies? This will replace your current data.`)) return;
        state = data;
        save(state);
        activeId = null;
        renderList();
        renderDetail();
        toast(`Imported ${data.companies.length} companies`);
      } catch {
        alert('Invalid file — please use a ClientLog export.');
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  // ── Init ──
  renderList();
  renderDetail();
</script>
</body>
</html>
