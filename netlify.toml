[build]
  publish = "."
  [build.environment]
    NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"

[functions."*"]
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/showcase.html"
  [headers.values]
    Basic-Auth = "salesbuildr:victor-buildr"
